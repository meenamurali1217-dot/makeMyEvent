<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up & Login</title>
    <link rel="stylesheet" href="../CSS/signup_style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body>
    <div class="container">
        <div class="form-box login">
            <form action="#">
                <h1>Login</h1>
                <div class="input-box">
                    <input type="text" placeholder="Username" required />
                    <i class="fa-solid fa-user"></i>
                </div>
                <div class="input-box">
                    <input type="password" placeholder="Password" required />
                    <i class="fa-solid fa-lock"></i>
                </div>
                <div class="forgot-link">
                    <a href="#">Forgot Password?</a>
                </div>
                <button type="submit" class="btn submit-btn" data-target="../Home/index.html">Login</button>
                <p>or login with social platforms</p>
                <div class="social-icons">
                    <a href="https://www.google.com"><i class="fa-brands fa-google"></i></a>
                    <a href="https://www.facebook.com"><i class="fa-brands fa-facebook-f"></i></a>
                    <a href="https://www.twitter.com"><i class="fa-brands fa-twitter"></i></a>
                    <a href="https://www.linkedin.com"><i class="fa-brands fa-linkedin-in"></i></a>
                    <a href="https://www.instagram.com"><i class="fa-brands fa-instagram"></i></a>
                </div>
            </form>
        </div>

        <div class="form-box register">
            <form action="#">
                <h1>Registration</h1>
                <div class="input-box">
                    <input type="text" placeholder="Address" required />
                    <i class="fa-solid fa-location-dot"></i>
                </div>
                <div class="input-box">
                    <input type="text" placeholder="Username" required />
                    <i class="fa-solid fa-user"></i>
                </div>
                <div class="input-box">
                    <input type="email" placeholder="Email" required />
                    <i class="fa-solid fa-envelope"></i>
                </div>
                <div class="input-box">
                    <input type="tel" placeholder="Contact" required />
                    <i class="fa-solid fa-phone"></i>
                </div>
                <div class="input-box">
                    <select required>
                        <option value="" disabled selected>Gender</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                        <option value="other">Other</option>
                    </select>
                    <i class="fa-solid fa-venus-mars"></i>
                </div>
                <div class="input-box">
                    <input type="number" placeholder="Age" required />
                    <i class="fa-solid fa-calendar-days"></i>
                </div>
                <div class="input-box">
                    <input type="password" id="password" placeholder="Password" required />
                    <i class="fa-solid fa-lock"></i>
                </div>
                <div class="input-box">
                    <input type="password" id="confirmPassword" placeholder="Confirm Password" required />
                    <i class="fa-solid fa-lock"></i>
                </div>

                <p id="error-msg"></p>
                
              
                <button type="submit" class="btn submit-btn" data-target="../Home/index.html">Register</button>
                <p>or register with social platforms</p>
                <div class="social-icons">
                    <a href="https://www.google.com"><i class="fa-brands fa-google"></i></a>
                    <a href="https://www.facebook.com"><i class="fa-brands fa-facebook-f"></i></a>
                    <a href="https://www.twitter.com"><i class="fa-brands fa-twitter"></i></a>
                    <a href="https://www.linkedin.com"><i class="fa-brands fa-linkedin-in"></i></a>
                    <a href="https://www.instagram.com"><i class="fa-brands fa-instagram"></i></a>
                </div>
            </form>
        </div>

        <div class="toggle-box">
            <div class="toggle-panel toggle-left">
                <h1>Hello, Welcome!</h1>
                <p>Don't have an account?</p>
                <button class="btn-toggle register-btn">Register</button>
            </div>
            <div class="toggle-panel toggle-right">
                <h1>Welcome Back!</h1>
                <p>Already have an account?</p>
                <button class="btn-toggle login-btn">Login</button>
            </div>
        </div>
    </div>

    <script src="../JavaScript/sigup_script.js"></script>
</body>
</html>
